services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agri}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agripass}
      POSTGRES_DB: ${POSTGRES_DB:-agri_agent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Shell script is more reliable than \gexec SQL for creating the langflow DB
      - ./scripts/init_postgres.sh:/docker-entrypoint-initdb.d/init.sh
    ports:
      - "5432:5432"
    healthcheck:
      # Checks that the specific agri_agent database exists and accepts queries —
      # stronger than pg_isready which only checks the server socket.
      test:
        - "CMD-SHELL"
        - "psql -U ${POSTGRES_USER:-agri} -d ${POSTGRES_DB:-agri_agent} -c 'SELECT 1' -q --no-align --tuples-only"
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  langflow:
    image: langflowai/langflow:latest
    environment:
      LANGFLOW_DATABASE_URL: postgresql://${POSTGRES_USER:-agri}:${POSTGRES_PASSWORD:-agripass}@postgres:5432/langflow
      LANGFLOW_LOG_LEVEL: info
      LANGFLOW_AUTO_LOGIN: "false"
      LANGFLOW_SUPERUSER: ${LANGFLOW_SUPERUSER:-admin}
      LANGFLOW_SUPERUSER_PASSWORD: ${LANGFLOW_SUPERUSER_PASSWORD:-adminpass123}
      # Stable JWT signing key — prevents token invalidation on container restart
      LANGFLOW_SECRET_KEY: ${LANGFLOW_SECRET_KEY:-change-this-to-a-long-random-string-before-going-to-prod}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
      LANGCHAIN_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-agri-langflow}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "7860:7860"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - langflow_data:/app/langflow
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-agri}:${POSTGRES_PASSWORD:-agripass}@postgres:5432/agri_agent
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-agri}:${POSTGRES_PASSWORD:-agripass}@postgres:5432/agri_agent
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      LANGCHAIN_TRACING_V2: ${LANGSMITH_TRACING:-false}
      LANGCHAIN_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGCHAIN_PROJECT: ${LANGSMITH_PROJECT:-agri-agent-api}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-agri-agent-api}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      API_KEY: ${API_KEY:-dev-secret-key-change-in-prod}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: agri-agent-api
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      JAEGER_UI_URL: ${JAEGER_UI_URL:-http://localhost:16686}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./agents:/app/agents:ro
      - ./src:/app/src:ro
      - ./scripts:/app/scripts:ro   # live-reload scripts without rebuild
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-agri}:${POSTGRES_PASSWORD:-agripass}@postgres:5432/agri_agent
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-agri}:${POSTGRES_PASSWORD:-agripass}@postgres:5432/agri_agent
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      LANGCHAIN_TRACING_V2: ${LANGSMITH_TRACING:-false}
      LANGCHAIN_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGCHAIN_PROJECT: ${LANGSMITH_PROJECT:-agri-agent-worker}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-agri-agent-worker}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      API_KEY: ${API_KEY:-dev-secret-key-change-in-prod}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: agri-agent-worker
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      JAEGER_UI_URL: ${JAEGER_UI_URL:-http://localhost:16686}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./agents:/app/agents:ro
      - ./src:/app/src:ro
      - ./scripts:/app/scripts:ro
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC (available if needed)
      - "4318:4318"    # OTLP HTTP (used by the api/worker exporters)
    restart: unless-stopped

  adminer:
    image: adminer:latest
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha-dark
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  langflow_data:
