services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fde}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fdepass}
      POSTGRES_DB: ${POSTGRES_DB:-fde_agent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      # Checks that the specific fde_agent database exists and accepts queries —
      # stronger than pg_isready which only checks the server socket.
      test:
        - "CMD-SHELL"
        - "psql -U ${POSTGRES_USER:-fde} -d ${POSTGRES_DB:-fde_agent} -c 'SELECT 1' -q --no-align --tuples-only"
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-fde}:${POSTGRES_PASSWORD:-fdepass}@postgres:5432/fde_agent
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-fde}:${POSTGRES_PASSWORD:-fdepass}@postgres:5432/fde_agent
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      LANGCHAIN_TRACING_V2: ${LANGSMITH_TRACING:-false}
      LANGCHAIN_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGCHAIN_PROJECT: ${LANGSMITH_PROJECT:-fde-agent-api}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-fde-agent-api}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      API_KEY: ${API_KEY:-dev-secret-key-change-in-prod}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      COMPANIES_TO_SHOW: ${COMPANIES_TO_SHOW:-sandhar,fundly}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: fde-agent-api
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      JAEGER_UI_URL: ${JAEGER_UI_URL:-http://localhost:16686}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./agents:/app/agents:ro
      - ./src:/app/src:ro
      - ./scripts:/app/scripts:ro
      - ./alembic:/app/alembic:ro   # live migrations without rebuild
      - ./tests:/app/tests:ro
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-fde}:${POSTGRES_PASSWORD:-fdepass}@postgres:5432/fde_agent
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-fde}:${POSTGRES_PASSWORD:-fdepass}@postgres:5432/fde_agent
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      LANGCHAIN_TRACING_V2: ${LANGSMITH_TRACING:-false}
      LANGCHAIN_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGCHAIN_PROJECT: ${LANGSMITH_PROJECT:-fde-agent-worker}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-fde-agent-worker}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      API_KEY: ${API_KEY:-dev-secret-key-change-in-prod}
      API_BASE_URL: http://api:8000
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: fde-agent-worker
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      JAEGER_UI_URL: ${JAEGER_UI_URL:-http://localhost:16686}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./agents:/app/agents:ro
      - ./src:/app/src:ro
      - ./scripts:/app/scripts:ro
      - ./alembic:/app/alembic:ro
      - ./tests:/app/tests:ro
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC (available if needed)
      - "4318:4318"    # OTLP HTTP (used by the api/worker exporters)
    restart: unless-stopped

  adminer:
    image: adminer:latest
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha-dark
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_USER: ${MYSQL_USER:-fde}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-fdepass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-fde_dev}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./crm.sql:/docker-entrypoint-initdb.d/crm.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  mysql_data:
