<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sandhar — Supervisor View</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: #f0f2f5; color: #1a1a2e; font-size: 14px; }
    header { background: #1a1a2e; color: #fff; padding: 0 28px; height: 56px;
             display: flex; align-items: stretch; justify-content: space-between; }
    .header-brand { display: flex; align-items: center; gap: 10px; }
    header h1 { font-size: 17px; font-weight: 700; }
    nav { display: flex; align-items: stretch; }
    nav a { display: flex; align-items: center; padding: 0 14px; color: #8899bb;
            text-decoration: none; font-size: 13px; font-weight: 500;
            border-bottom: 3px solid transparent; }
    nav a:hover { color: #a5b4fc; }
    nav a.active { color: #a5b4fc; border-bottom-color: #4f46e5; }
    .main { max-width: 1100px; margin: 0 auto; padding: 24px 28px; }
    h2 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { color: #6b7280; font-size: 13px; margin-bottom: 24px; }
    .card { background: #fff; border-radius: 10px; padding: 24px;
            box-shadow: 0 1px 4px rgba(0,0,0,.08); border: 1px solid #e5e7eb; margin-bottom: 20px; }
    .filter-bar { display: flex; gap: 14px; align-items: flex-end; flex-wrap: wrap; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    label { font-size: 12px; font-weight: 600; color: #374151; text-transform: uppercase; letter-spacing: .4px; }
    input[type=date], select { padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px;
           border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer;
           border: none; transition: opacity .15s; }
    .btn:hover { opacity: .88; }
    .btn-primary { background: #1a1a2e; color: #fff; }
    .btn-outline { background: #fff; color: #1a1a2e; border: 1px solid #d1d5db; }
    .btn-success { background: #16a34a; color: #fff; }
    .btn-warning { background: #d97706; color: #fff; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 8px 12px; font-size: 11px; font-weight: 700; color: #888;
         text-transform: uppercase; background: #fafafa; border-bottom: 1px solid #eee; }
    td { padding: 10px 12px; border-bottom: 1px solid #f5f5f5; }
    .target-card { background: linear-gradient(135deg, #7c3aed, #6d28d9); color: white;
                   border-radius: 10px; padding: 20px; margin-bottom: 20px; }
    .target-qty { font-size: 48px; font-weight: 700; }
    .target-label { font-size: 12px; opacity: .8; margin-top: 4px; }
    .actuals-form { display: none; }
    .actuals-form.open { display: block; }
    .form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
    .form-group input { padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px;
                        font-size: 14px; width: 100%; }
    .achievement-bar { height: 8px; background: #e5e7eb; border-radius: 4px; margin-top: 8px; }
    .achievement-fill { height: 100%; border-radius: 4px; transition: width .5s; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 100; }
    .modal-overlay.open { display: flex; align-items: center; justify-content: center; }
    .modal { background: #fff; border-radius: 12px; padding: 28px; max-width: 460px; width: 100%; }
    .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
    .modal select, .modal textarea { width: 100%; padding: 8px 12px; border: 1px solid #d1d5db;
                                      border-radius: 6px; font-size: 14px; margin-bottom: 12px; }
    .modal textarea { height: 80px; resize: vertical; }
    .empty { color: #9ca3af; font-size: 13px; text-align: center; padding: 40px; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #e5e7eb;
               border-top-color: #7c3aed; border-radius: 50%; animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #toast { position: fixed; bottom: 24px; right: 24px; background: #1a1a2e; color: white;
             padding: 10px 18px; border-radius: 8px; font-size: 13px; display: none;
             box-shadow: 0 4px 12px rgba(0,0,0,.2); z-index: 999; }
  </style>
</head>
<body>
<header>
  <div class="header-brand">
    <h1>Sandhar Group</h1>
    <span style="width:1px;height:20px;background:#334;"></span>
    <span style="font-size:12px;color:#8899bb;">Smart Production Planning</span>
  </div>
  <nav>
    <a href="/sandhar">🏭 Command Centre</a>
    <a href="/sandhar/plan">📋 Plan</a>
    <a href="/sandhar/floor" class="active">👷 Floor</a>
    <a href="/sandhar/master">🗂 Master Data</a>
    <a href="/sandhar/simulation">🎮 Simulation</a>
    <span style="width:1px;height:20px;background:#334;margin:auto 4px;"></span>
    <a href="/approvals">🔔 Approvals</a>
  </nav>
</header>

<div class="main">
  <h2>Supervisor Floor View</h2>
  <p class="subtitle">View your line plan, record actuals, and report disruptions</p>

  <div class="card">
    <div class="filter-bar">
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="floor-date" value="{{ today }}">
      </div>
      <div class="form-group">
        <label>Line</label>
        <select id="floor-line"><option value="">Select line…</option></select>
      </div>
      <div class="form-group">
        <label>Shift</label>
        <select id="floor-shift">
          <option value="A">Shift A (06:00–14:00)</option>
          <option value="B">Shift B (14:00–22:00)</option>
          <option value="C">Shift C (22:00–06:00)</option>
        </select>
      </div>
      <button class="btn btn-primary" onclick="loadFloorPlan()">Load Plan</button>
    </div>
  </div>

  <div id="floor-content">
    <div class="empty">Select a date, line, and shift to load the floor plan</div>
  </div>
</div>

<!-- Disruption Modal -->
<div class="modal-overlay" id="disruption-modal">
  <div class="modal">
    <div class="modal-title">⚠️ Report Disruption</div>
    <label style="font-size:12px;font-weight:600;display:block;margin-bottom:4px;">Type</label>
    <select id="disr-type">
      <option value="machine_breakdown">Machine Breakdown</option>
      <option value="material_shortage">Material Shortage</option>
      <option value="production_delay">Production Delay</option>
      <option value="skill_gap">Skill Gap</option>
    </select>
    <label style="font-size:12px;font-weight:600;display:block;margin-bottom:4px;">Severity</label>
    <select id="disr-severity">
      <option value="critical">Critical</option>
      <option value="high">High</option>
      <option value="medium">Medium</option>
    </select>
    <label style="font-size:12px;font-weight:600;display:block;margin-bottom:4px;">Description</label>
    <textarea id="disr-message" placeholder="Describe the disruption…"></textarea>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-warning" onclick="submitDisruption()">Submit Report</button>
      <button class="btn btn-outline" onclick="document.getElementById('disruption-modal').classList.remove('open')">Cancel</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API_KEY = '{{ api_key }}';
const H = {'X-API-Key': API_KEY, 'Content-Type': 'application/json'};
let currentPlanDetailId = null;
let currentLineId = null;
let currentPlanDate = null;
let currentShiftCode = null;

function toast(msg, ok=true) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = ok ? '#16a34a' : '#dc2626';
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

// Load lines into selector
async function loadLines() {
  try {
    const resp = await fetch('/api/v1/sandhar/lines', {headers: H});
    const lines = await resp.json();
    const sel = document.getElementById('floor-line');
    for (const l of lines) {
      const opt = document.createElement('option');
      opt.value = l.id;
      opt.textContent = `${l.line_code} — ${l.line_name}`;
      sel.appendChild(opt);
    }
  } catch(e) {}
}

async function loadFloorPlan() {
  const planDate = document.getElementById('floor-date').value;
  const lineId = document.getElementById('floor-line').value;
  const shiftCode = document.getElementById('floor-shift').value;
  if (!lineId) { toast('Please select a line', false); return; }

  currentPlanDate = planDate;
  currentShiftCode = shiftCode;
  currentLineId = lineId;

  document.getElementById('floor-content').innerHTML = '<div class="empty"><span class="spinner"></span> Loading floor plan…</div>';

  try {
    const resp = await fetch(`/api/v1/sandhar/execution/supervisor-view?line_id=${lineId}&shift_code=${shiftCode}&plan_date=${planDate}`, {headers: H});
    if (!resp.ok) {
      document.getElementById('floor-content').innerHTML = '<div class="empty">No approved plan found for this line/shift/date. Generate and approve a plan first.</div>';
      return;
    }
    const data = await resp.json();
    renderFloorPlan(data);
  } catch(e) {
    document.getElementById('floor-content').innerHTML = '<div class="empty">Error loading floor plan: ' + e.message + '</div>';
  }
}

function renderFloorPlan(data) {
  // API returns: { header, details: [...], operators: [...] }
  const planDetail = (data.details && data.details.length > 0) ? data.details[0] : {};
  const allocations = data.operators || [];
  currentPlanDetailId = planDetail.id;
  const plannedQty = planDetail.planned_qty;
  const qtyDisplay = (plannedQty !== null && plannedQty !== undefined)
    ? plannedQty.toLocaleString() + ' units'
    : `${planDetail.planned_manpower || 0} operators assigned`;

  let html = `
    <div class="target-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div>
          <div style="font-size:12px;opacity:.8;margin-bottom:4px;">PRODUCTION TARGET</div>
          <div class="target-qty">${plannedQty !== null && plannedQty !== undefined ? plannedQty.toLocaleString() : '—'}</div>
          <div class="target-label">${plannedQty !== null && plannedQty !== undefined ? 'units planned for Shift ' + currentShiftCode : 'Qty not computed — re-run plan to get target'}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:12px;opacity:.8;">STATUS</div>
          <div style="font-size:18px;font-weight:700;margin-top:4px;">${planDetail.status || data.header?.status || 'planned'}</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div style="font-size:15px;font-weight:600;margin-bottom:14px;">Operator Assignments (${allocations.length} operators)</div>
      ${allocations.length > 0 ? `
        <table>
          <thead><tr><th>Employee</th><th>Designation</th><th>Status</th></tr></thead>
          <tbody>
            ${allocations.map(a => `<tr>
              <td>${a.name || a.employee_code || a.employee_id?.substring(0,8)+'…'}</td>
              <td>${a.designation || '—'}</td>
              <td><span style="color:#16a34a;">${a.allocation_status || 'Allocated'}</span></td>
            </tr>`).join('')}
          </tbody>
        </table>` : '<div class="empty">No operators allocated</div>'}
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
        <div style="font-size:15px;font-weight:600;">📊 Record Actuals</div>
        <div style="display:flex;gap:10px;">
          <button class="btn btn-success" onclick="toggleActuals()">Enter Actuals</button>
          <button class="btn btn-warning" onclick="document.getElementById('disruption-modal').classList.add('open')">⚠️ Report Disruption</button>
        </div>
      </div>
      <div class="actuals-form" id="actuals-form">
        <div class="form-grid">
          <div class="form-group"><label>Produced Qty</label><input type="number" id="act-produced" min="0" placeholder="0"></div>
          <div class="form-group"><label>Rejected Qty</label><input type="number" id="act-rejected" min="0" value="0"></div>
          <div class="form-group"><label>Rework Qty</label><input type="number" id="act-rework" min="0" value="0"></div>
          <div class="form-group"><label>Downtime (min)</label><input type="number" id="act-downtime" min="0" value="0"></div>
          <div class="form-group"><label>Submitted By</label><input type="text" id="act-by" value="Supervisor" placeholder="Your name"></div>
        </div>
        <button class="btn btn-primary" onclick="submitActuals()">Submit Actuals</button>
      </div>
      <div id="actuals-result" style="margin-top:12px;"></div>
    </div>
  `;
  document.getElementById('floor-content').innerHTML = html;
}

function toggleActuals() {
  const form = document.getElementById('actuals-form');
  form.classList.toggle('open');
}

async function submitActuals() {
  if (!currentPlanDetailId) { toast('No plan detail loaded', false); return; }
  const payload = {
    produced_qty: parseInt(document.getElementById('act-produced').value) || 0,
    rejected_qty: parseInt(document.getElementById('act-rejected').value) || 0,
    rework_qty: parseInt(document.getElementById('act-rework').value) || 0,
    downtime_minutes: parseInt(document.getElementById('act-downtime').value) || 0,
    submitted_by: document.getElementById('act-by').value || 'Supervisor',
  };
  try {
    const resp = await fetch(`/api/v1/sandhar/execution/${currentPlanDetailId}/actuals`, {
      method: 'POST', headers: H, body: JSON.stringify(payload),
    });
    const data = await resp.json();
    if (resp.ok) {
      const pct = data.achievement_pct || 0;
      const color = pct >= 85 ? '#16a34a' : pct >= 70 ? '#d97706' : '#dc2626';
      document.getElementById('actuals-result').innerHTML = `
        <div style="background:#f9fafb;border-radius:8px;padding:14px;">
          <div style="font-size:13px;font-weight:600;margin-bottom:8px;">✅ Actuals Submitted</div>
          <div style="font-size:28px;font-weight:700;color:${color};">${pct.toFixed(1)}% achieved</div>
          <div class="achievement-bar"><div class="achievement-fill" style="width:${Math.min(pct,100)}%;background:${color};"></div></div>
          ${data.alert_created ? '<div style="color:#d97706;font-size:12px;margin-top:8px;">⚠️ Low achievement alert created</div>' : ''}
        </div>
      `;
      document.getElementById('actuals-form').classList.remove('open');
      toast('Actuals submitted — ' + pct.toFixed(1) + '% achievement');
    } else {
      toast(data.detail || 'Submission failed', false);
    }
  } catch(e) { toast('Error: ' + e.message, false); }
}

async function submitDisruption() {
  const payload = {
    alert_type: document.getElementById('disr-type').value,
    alert_message: document.getElementById('disr-message').value,
    severity: document.getElementById('disr-severity').value,
    plan_date: currentPlanDate || '{{ today }}',
    shift_code: currentShiftCode || 'A',
    related_line_id: currentLineId || '',
  };
  try {
    const resp = await fetch('/api/v1/sandhar/execution/disruption', {
      method: 'POST', headers: H, body: JSON.stringify(payload),
    });
    if (resp.ok) {
      document.getElementById('disruption-modal').classList.remove('open');
      document.getElementById('disr-message').value = '';
      toast('Disruption reported');
    } else {
      toast('Failed to report disruption', false);
    }
  } catch(e) { toast('Error: ' + e.message, false); }
}

loadLines();
</script>
</body>
</html>
