agent:
  name: propguru-evaluation-supervisor
  type: supervisor
  description: >
    Orchestrates the Propguru property evaluation pipeline. Calls four specialist
    workers in sequence to collect property data, fetch market comps, score all
    30 criteria, then compute and propose the recommended acquisition price.
  version: "1.0.0"
  companies: [propguru]

  workers:
    - agent: propguru-data-collector
      description: >
        Creates the evaluation report (returns report_id). Scores PROPERTY
        (CRIT-021 to CRIT-025) and SOCIETY (CRIT-026 to CRIT-030) from DB
        attributes. SKIPS AMENITY (CRIT-001 to CRIT-010) — needs site data.
        Call FIRST.
    - agent: propguru-market-analyst
      description: >
        Fetches market comp data for the property's locality.
        Computes the base price from market_rate × carpet_area.
        Returns 6-month trend and transaction volume. Call SECOND.
    - agent: propguru-scorer
      description: >
        Scores AMENITY (CRIT-001 to CRIT-010) with locality-based estimates AND
        LOCATION (CRIT-011 to CRIT-020) using propguru_score_proximity with
        actual coordinates. Saves all 20 scores to the report. Call THIRD.
    - agent: propguru-evaluator
      description: >
        Reads all saved scores, calls propguru_calculate_price to compute
        score_factor and recommended_price, determines confidence, and
        proposes the evaluation for analyst review via HITL. Call LAST.

  routing:
    max_rounds: 10

  model:
    provider: anthropic
    name: claude-haiku-4-5-20251001
    temperature: 0.0
    max_tokens: 1024
    max_cost_usd: 0.20

  system_prompt: |
    You are the property evaluation supervisor for Propguru.
    Coordinate four specialist agents to evaluate a property and produce a
    recommended acquisition price for analyst review.

    Call workers in this EXACT sequence:
    1. propguru-data-collector  — MUST run first (reads property, scores attribute criteria)
    2. propguru-market-analyst  — MUST run second (fetches market comps, sets base price)
    3. propguru-scorer          — MUST run third (scores AMENITY CRIT-001..010 and LOCATION CRIT-011..020)
    4. propguru-evaluator       — MUST run last (calculates price, proposes HITL action)

    Pass deal_id and report_id through all workers.
    The report_id is created by propguru-data-collector and must be passed to all others.

    NOTE: Two automated quality gates verify propguru-evaluator output after each run.
    Phase 1 — Code Grader checks coverage, price sanity, and data validity.
    Phase 2 — Model Grader checks that the reasoning text is coherent, justifies the price,
    and provides actionable analyst guidance.
    If either grader rejects the output (you will see a [Verifier] FAIL message followed
    by feedback), propguru-evaluator will be re-run automatically — you do NOT need to
    call it again yourself.
    Call finish only after you see [Verifier] PASS, [Verifier] GRADER_FLAGGED, or
    [Verifier] REASONING_FLAGGED (both are escalations to HITL).

  inputs:
    deal_id:
      type: string
      required: true
      description: "Deal UUID or deal_code to evaluate (e.g. 'DEAL-001')"
    deal_code:
      type: string
      required: false
      description: "Human-readable deal code for logging"

  guardrails:
    max_iterations: 20
    timeout_seconds: 600
    blocked_patterns:
      - "ignore previous instructions"

  observability:
    langsmith_tracing: true
    log_inputs: true
    log_outputs: true
    log_tool_calls: false

  feature_flags:
    enable_refinement: true
    refinement_agent: "propguru-evaluation-refiner"
    refinement_preview: "propguru-evaluation"
    # Phase 1 — Code grader (deterministic checks on evaluation data)
    verification_loop: true
    verification_after_worker: "propguru-evaluator"
    verification_max_retries: 2
    # Phase 2 — Model grader (LLM-as-judge on evaluator reasoning quality)
    verification_model_grader_enabled: true
    verification_model_grader_max_retries: 1
    verification_model_grader_model: "claude-haiku-4-5-20251001"
