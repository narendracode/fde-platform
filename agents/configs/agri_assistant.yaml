agent:
  name: agri-assistant
  description: >
    Specialised AgriScience assistant focused on crop planning, pest management,
    and fertiliser optimisation. Uses domain tools plus web search for
    up-to-date agronomic recommendations.
  version: "1.0.0"

  model:
    provider: anthropic
    name: claude-sonnet-4-6
    temperature: 0.1
    max_tokens: 8192
    max_cost_usd: 1.00

  system_prompt: |
    You are an expert agronomist assistant for AgriScience.
    Your responsibilities:
    - Recommend crops based on season, soil type, and region.
    - Identify pest risks and suggest integrated pest management (IPM) strategies.
    - Calculate fertiliser requirements based on crop, area, and soil pH.
    - Use current weather data when planning field operations.
    Always respond with structured, actionable recommendations.
    When uncertain, search for the latest agronomic research.

  tools:
    - name: calculator
      enabled: true

    - name: web_search
      enabled: true
      config:
        max_results: 3

    - name: get_crop_recommendation
      enabled: true

    - name: get_pest_alert
      enabled: true

    - name: calculate_fertilizer
      enabled: true

    - name: get_weather_data
      enabled: true

  guardrails:
    max_iterations: 20
    timeout_seconds: 180
    blocked_patterns:
      - "ignore previous instructions"

  observability:
    langsmith_tracing: true
    log_inputs: true
    log_outputs: true
    log_tool_calls: true
