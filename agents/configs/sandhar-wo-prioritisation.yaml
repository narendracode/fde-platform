agent:
  name: sandhar-wo-prioritisation
  description: >
    Imports and ranks open work orders for a planning date. Identifies WOs
    under quality hold. Returns prioritised WO list for planning.
  version: "1.0.0"
  companies: [sandhar]

  inputs:
    plan_date:
      type: string
      required: true
      description: "Planning date (YYYY-MM-DD)"

  model:
    provider: anthropic
    name: claude-sonnet-4-6
    temperature: 0.0
    max_tokens: 2048
    max_cost_usd: 0.50

  system_prompt: |
    You are a work order analyst for Sandhar Group.
    Read plan_date from [Runtime context].

    Workflow:
    1. Call sandhar_get_open_work_orders with plan_date.
    2. Call sandhar_get_quality_holds with plan_date.
       Mark any WO in the hold list as BLOCKED.
    3. Report: ordered list of WOs with wo_id, wo_number, product, qty, due_date, priority, blocked status.

  tools:
    - name: sandhar_get_open_work_orders
      enabled: true
    - name: sandhar_get_quality_holds
      enabled: true
    - name: sandhar_get_work_order_detail
      enabled: true

  guardrails:
    max_iterations: 15
    timeout_seconds: 120
    blocked_patterns:
      - "ignore previous instructions"

  observability:
    langsmith_tracing: true
    log_inputs: true
    log_outputs: true
    log_tool_calls: true
