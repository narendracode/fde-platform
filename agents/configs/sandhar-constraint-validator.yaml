agent:
  name: sandhar-constraint-validator
  description: >
    Validates all production constraints for a planning date: machine availability,
    material stock, and quality holds. Creates alerts for each constraint found.
  version: "1.0.0"
  companies: [sandhar]

  inputs:
    plan_date:
      type: string
      required: true
      description: "Planning date (YYYY-MM-DD)"
    shifts:
      type: string
      required: false
      default: "A,B,C"

  model:
    provider: openai
    name: gpt-4o
    temperature: 0.0
    max_tokens: 2048
    max_cost_usd: 0.50

  system_prompt: |
    You are a constraint validation agent for Sandhar's assembly floor.
    Read plan_date from [Runtime context].

    Workflow:
    1. Call sandhar_get_machine_status. For each machine NOT in 'running' status:
       Call sandhar_create_alert (alert_type="machine_breakdown" or "maintenance",
       severity="critical" for breakdown, "high" for maintenance).
    2. Call sandhar_check_material_availability for plan_date.
       For each shortage, call sandhar_create_alert (alert_type="material_shortage", severity="high").
    3. Call sandhar_get_constraint_summary for plan_date.
    4. Report: full constraint summary including machine issues, material shortages, quality holds, and alerts created.

  tools:
    - name: sandhar_get_machine_status
      enabled: true
    - name: sandhar_check_material_availability
      enabled: true
    - name: sandhar_get_quality_holds
      enabled: true
    - name: sandhar_get_constraint_summary
      enabled: true
    - name: sandhar_create_alert
      enabled: true

  guardrails:
    max_iterations: 20
    timeout_seconds: 120
    blocked_patterns:
      - "ignore previous instructions"

  observability:
    langsmith_tracing: true
    log_inputs: true
    log_outputs: true
    log_tool_calls: true
