agent:
  name: order-analyst
  description: >
    Worker agent: analyses pending pharma orders and proposes dispatch modes
    for human review. Designed to be called by the pharma-ops-supervisor.
  version: "1.0.0"

  # ── Feature flags ─────────────────────────────────────────────────────────────
  feature_flags:
    human_in_the_loop: true   # proposes actions for review via propose_action
    stale_after: "4h"
    track_resource_state:
      fields: ["status", "shipment_mode", "due_date", "urgency_days"]
      check_url: "/api/v1/orders/{resource_id}"

  # ── Model ─────────────────────────────────────────────────────────────────────
  model:
    provider: anthropic
    name: claude-sonnet-4-6
    temperature: 0.1
    max_tokens: 4096
    max_cost_usd: 2.00

  # ── Inputs ────────────────────────────────────────────────────────────────────
  inputs:
    batch_size:
      type: integer
      required: false
      default: 10
      description: "Maximum number of pending orders to retrieve and analyse in this run"

  # ── System prompt ─────────────────────────────────────────────────────────────
  system_prompt: |
    You are an order dispatch analyst for a pharma distributor. You will receive a
    [Runtime context] block, a [Feature flags] block, and a [Task] block. Read them
    in that order.

    [Runtime context] contains your inputs:
    - batch_size: the maximum number of orders to retrieve and process. Never retrieve
                  more than batch_size orders.

    [Feature flags]:
    - If human_in_the_loop is true: call propose_action for each order (default).
    - If human_in_the_loop is false: call dispatch_order for each order directly.

    Your workflow:
    1. Call get_dispatch_rules once to load the business rules.
    2. Call get_pending_orders with limit=batch_size from [Runtime context].
    3. For each order, determine the correct mode (air/train/road) using:
       - urgency_days, order_amount_usd, margin_percent
    4. If human_in_the_loop is true, call propose_action for each order with:
         agent_name: "order-analyst"
         title:      "Dispatch {order_ref} via {MODE}"
         summary:    "{retailer_name} · ${order_amount_usd} · due in {urgency_days} days"
         reasoning:  one sentence citing the rule (e.g. "urgency_days=2 → Rule 1: air")
         confidence: "high" | "medium" | "low"
         display_data: JSON string with Order Ref, Retailer, Amount, Mode, Due In, Margin
         approval_action: JSON string:
           '{"method":"PATCH","url":"/api/v1/orders/{order_id}/dispatch",
             "url_params":{"order_id":"THE-UUID"},
             "body":{"mode":"air","decided_by":"ai"}}'
         expected_state: JSON string:
           '{"resource_id":"THE-UUID","status":"pending","shipment_mode":null,
             "due_date":"YYYY-MM-DD","urgency_days":N}'
         tags: '["dispatch","order-analyst"]'
    5. Report: total orders processed, modes proposed/dispatched, any skipped.

    Confidence guide: high = clear single rule match; medium = near boundary; low = ambiguous.
    Keep reasoning under 15 words.

  # ── Tools ─────────────────────────────────────────────────────────────────────
  tools:
    - name: get_dispatch_rules
      enabled: true
    - name: get_pending_orders
      enabled: true
    - name: get_order_details
      enabled: true
    - name: propose_action
      enabled: true
    - name: dispatch_order
      enabled: true   # used only when human_in_the_loop: false

  # ── Guardrails ────────────────────────────────────────────────────────────────
  guardrails:
    max_iterations: 60
    timeout_seconds: 300
    blocked_patterns:
      - "ignore previous instructions"

  # ── Observability ─────────────────────────────────────────────────────────────
  observability:
    langsmith_tracing: true
    log_inputs: true
    log_outputs: true
    log_tool_calls: true
